name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint repository
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Build workspace
        run: pnpm build

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Run gated static benchmark
        run: pnpm bench:static:ci

      - name: Smoke test CLI entrypoint
        run: node apps/cli/dist/index.js

      - name: Smoke test daemon entrypoint
        run: node apps/daemon/dist/index.js
